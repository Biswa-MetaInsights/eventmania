name: eventmind_platform
description: "A production-grade agentic AI event platform frontend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.1
  flutter_secure_storage: ^9.0.0
  go_router: ^13.2.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  image_picker: ^1.0.7
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.4
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/vectors/
